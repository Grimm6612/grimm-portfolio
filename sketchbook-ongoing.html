<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIMM — Sketchbook 26/02/14–Ongoing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside id="sidebar">
    <a class="logo" href="index.html">GRIMM</a>
    <nav id="nav"></nav>
  </aside>

  <main id="content">
    <h1 class="page-title">Sketchbook<br>26/02/14–Ongoing</h1>

    <div class="gallery-grid cols-3" id="gallery"></div>

    <div class="footer">
      <a href="#" onclick="window.scrollTo({top:0});return false;">↑ Back to Top</a>
    </div>
  </main>

  <div id="lightbox">
    <span id="lightbox-close">✕</span>
    <span id="lightbox-prev">‹</span>
    <img id="lightbox-img" src="" alt="">
    <span id="lightbox-next">›</span>
  </div>
  <script src="nav.js"></script>
  <script>
    buildNav('sketchbook-ongoing.html');

    // Auto-loads every image from the manifest.
    // To add images: drop files into the matching images/ folder,
    // then run  python build.py  (or push — GitHub Action handles it).
    async function loadGallery() {
      const gallery = document.getElementById('gallery');

      let images = [];
      try {
        const res = await fetch('images/sketchbook-ongoing/manifest.json');
        images = await res.json();
      } catch (e) {
        gallery.innerHTML = '<p style="padding:40px;color:var(--muted)">No images found yet.</p>';
        return;
      }

      if (images.length === 0) {
        gallery.innerHTML = '<p style="padding:40px;color:var(--muted)">No images yet — add some to images/ and run build.py.</p>';
        return;
      }

      images.forEach(src => {
        const div = document.createElement('div');
        div.className = 'thumb';
        div.innerHTML = `<img src="${src}" alt="" loading="lazy">`;
        gallery.appendChild(div);
      });

      buildLightbox(images);
    }

    loadGallery();
  </script>
</body>
</html>
