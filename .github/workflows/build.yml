name: Build image manifests

on:
  push:
    branches: [main]
    paths:
      - 'images/**'   # Only runs when images are added/removed
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit the generated manifests back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate manifests
        run: python build.py

      - name: Commit manifests (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/**/manifest.json
          git diff --staged --quiet || git commit -m "chore: update image manifests [skip ci]"
          git push
