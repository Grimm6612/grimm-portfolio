<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIMM — Work</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside id="sidebar">
    <a class="logo" href="index.html">GRIMM</a>
    <nav id="nav"></nav>
  </aside>

  <!-- ── Main ── -->
  <main id="content">

    <!--
    ══════════════════════════════════════════════════════════
    WORK PAGE CARDS
    Each object below is one gallery section.
    To add a new section:
      1. Add a new object to the SECTIONS array
      2. Create a matching HTML page for it
      3. Drop your images in a matching images/ subfolder
    ══════════════════════════════════════════════════════════
    -->
    <div class="gallery-grid cols-2" id="work-grid"></div>

    <div class="footer">
      <a href="#" onclick="window.scrollTo({top:0});return false;">↑ Back to Top</a>
    </div>
  </main>

  <!-- ── Lightbox (not used on this page but keeps structure consistent) ── -->
  <div id="lightbox">
    <span id="lightbox-close">✕</span>
    <span id="lightbox-prev">‹</span>
    <img id="lightbox-img" src="" alt="">
    <span id="lightbox-next">›</span>
  </div>

  <script src="nav.js"></script>
  <script>
    buildNav('index.html');

    // ── Work Sections ───────────────────────────────────────
    // Each entry creates one card on the homepage grid.
    // `cover` is the background image for the card.
    // `href`  is the page it links to.
    const SECTIONS = [
      {
        label:    'Digital',
        date:     'Ongoing',
        cover:    'images/work/digital-cover.jpg',
        href:     'digital.html',
      },
      {
        label:    'Sketchbook\n26/02/14–Ongoing',
        date:     '2026',
        cover:    'images/work/sketchbook-ongoing-cover.jpg',
        href:     'sketchbook-ongoing.html',
      },
      {
        label:    'Sketchbook\n26/01/17–26/02/13',
        date:     '2026',
        cover:    'images/work/sketchbook-jan-feb-cover.jpg',
        href:     'sketchbook-jan-feb.html',
      },
      {
        label:    'Sketchbook\n25/11/29–26/01/17',
        date:     '2025–2026',
        cover:    'images/work/sketchbook-nov-jan-cover.jpg',
        href:     'sketchbook-nov-jan.html',
      },
    ];

    const grid = document.getElementById('work-grid');
    SECTIONS.forEach(s => {
      const a = document.createElement('a');
      a.href = s.href;
      a.className = 'cover-card';
      a.innerHTML = `
        <img src="${s.cover}" alt="${s.label}" onerror="this.style.display='none'">
        <div class="card-label">
          <span>${s.date}</span>
          ${s.label.replace('\n','<br>')}
        </div>`;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
