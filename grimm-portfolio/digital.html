<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIMM — Sketchbook Digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside id="sidebar">
    <a class="logo" href="index.html">GRIMM</a>
    <nav id="nav"></nav>
  </aside>

  <main id="content">
    <h1 class="page-title">Sketchbook<br>Digital</h1>

    <div class="gallery-grid cols-3" id="gallery"></div>

    <div class="footer">
      <a href="#" onclick="window.scrollTo({top:0});return false;">↑ Back to Top</a>
    </div>
  </main>

  <div id="lightbox">
    <span id="lightbox-close">✕</span>
    <span id="lightbox-prev">‹</span>
    <img id="lightbox-img" src="" alt="">
    <span id="lightbox-next">›</span>
  </div>

  <script src="nav.js"></script>
  <script>
    buildNav('digital.html');

    // ══════════════════════════════════════════════════════
    // ADD NEW IMAGES HERE
    // Just append a new filename to this array.
    // Put the image file in:  images/digital/
    // Example:  'my-new-sketch.jpg',
    // ══════════════════════════════════════════════════════
    const IMAGES = [
      'images/digital/sketch-01.jpg',
      'images/digital/sketch-02.jpg',
      'images/digital/sketch-03.jpg',
      // ← add more here
    ];

    const gallery = document.getElementById('gallery');
    IMAGES.forEach(src => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `<img src="${src}" alt="" loading="lazy">`;
      gallery.appendChild(div);
    });

    buildLightbox(IMAGES);
  </script>
</body>
</html>
